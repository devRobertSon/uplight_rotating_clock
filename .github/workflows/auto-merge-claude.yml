name: Auto-merge claude PRs

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: startsWith(github.head_ref, 'claude/') && github.base_ref == 'main' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Squash merge to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge --repo "$REPO" --squash --delete-branch "$PR"
