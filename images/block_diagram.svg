<svg viewBox="0 0 760 860" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa; max-width:100%; height:auto; font-family: system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="1" refY="5" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#444"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 18px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 12px; fill: #555; }
    .bname { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .bsub { font-size: 10px; fill: #555; }
    .iface { font-size: 10px; font-weight: 600; fill: #2255aa; }
    .net { font-size: 11px; font-weight: 700; fill: #0d7a3f; }
    .pwr { font-size: 11px; font-weight: 700; fill: #b35800; }
    .note { font-size: 10px; fill: #777; font-style: italic; }
    .mega { fill: #e3eaf4; stroke: #2f5179; stroke-width: 2; }
    .mcu_inner { fill: #f5f8ff; stroke: #2f5179; stroke-width: 1; stroke-dasharray: 4,2; }
    .box { fill: #f4f4f4; stroke: #666; stroke-width: 1.3; }
    .motor { fill: #fff4e1; stroke: #c99400; stroke-width: 1.2; }
    .sens { fill: #e1f0e4; stroke: #0d7a3f; stroke-width: 1.2; }
    .net_box { fill: #eaf4e8; stroke: #0d7a3f; stroke-width: 1.3; stroke-dasharray: 5,3; }
    .pwr_box { fill: #fdf0dd; stroke: #b35800; stroke-width: 1.3; }
    .led_box { fill: #fff6c9; stroke: #b38a00; stroke-width: 1.3; }
  </style>

  <!-- Title -->
  <text x="20" y="30" class="title">시스템 블록도 · 아크릴 회전 숫자 시계 v2.0</text>
  <text x="20" y="48" class="sub">Mega 2560 WiFi R3 중심 · 5V 통일 · 54 GPIO 직결 · APSTA 동시 운용</text>

  <!-- ============ Network (top) ============ -->
  <text x="20" y="90" class="iface">── 외부 네트워크 (WiFi APSTA 동시 활성, ESP8266 AT) ──</text>

  <rect x="40" y="105" width="200" height="55" class="net_box" rx="4"/>
  <text x="140" y="125" class="net" text-anchor="middle">홈 WiFi (STA)</text>
  <text x="140" y="140" class="bsub" text-anchor="middle">→ NTP: kr.pool.ntp.org</text>
  <text x="140" y="154" class="bsub" text-anchor="middle">→ 기상청 단기예보 API</text>

  <rect x="270" y="105" width="200" height="55" class="net_box" rx="4"/>
  <text x="370" y="125" class="net" text-anchor="middle">설정 AP ("시계설정")</text>
  <text x="370" y="140" class="bsub" text-anchor="middle">WPA2 · 캡티브 포털</text>
  <text x="370" y="154" class="bsub" text-anchor="middle">폰에서 SSID/PW 입력</text>

  <rect x="500" y="105" width="200" height="55" class="net_box" rx="4"/>
  <text x="600" y="125" class="net" text-anchor="middle">외부 서비스</text>
  <text x="600" y="140" class="bsub" text-anchor="middle">· NTP (1시간 주기)</text>
  <text x="600" y="154" class="bsub" text-anchor="middle">· KMA 기상청 (1시간 주기)</text>

  <line x1="500" y1="140" x2="470" y2="140" stroke="#0d7a3f" stroke-width="1" marker-end="url(#ar2)"/>

  <!-- ============ Hall sensors (upper row) ============ -->
  <text x="20" y="200" class="iface">── 홀센서 × 6 (A3144, 5V · Mega 인터럽트 핀 직결) ──</text>

  <g>
    <rect x="30" y="215" width="110" height="55" class="sens" rx="4"/>
    <text x="85" y="232" class="bname" text-anchor="middle" font-size="11">홀 1 · 요일</text>
    <text x="85" y="250" class="bsub" text-anchor="middle">A3144 + 10kΩ 풀업</text>
    <text x="85" y="263" class="bsub" text-anchor="middle">D2 (INT0)</text>

    <rect x="150" y="215" width="110" height="55" class="sens" rx="4"/>
    <text x="205" y="232" class="bname" text-anchor="middle" font-size="11">홀 2 · 시십</text>
    <text x="205" y="250" class="bsub" text-anchor="middle">A3144</text>
    <text x="205" y="263" class="bsub" text-anchor="middle">D3 (INT1)</text>

    <rect x="270" y="215" width="110" height="55" class="sens" rx="4"/>
    <text x="325" y="232" class="bname" text-anchor="middle" font-size="11">홀 3 · 시일</text>
    <text x="325" y="250" class="bsub" text-anchor="middle">A3144</text>
    <text x="325" y="263" class="bsub" text-anchor="middle">D18 (INT5)</text>

    <rect x="390" y="215" width="110" height="55" class="sens" rx="4"/>
    <text x="445" y="232" class="bname" text-anchor="middle" font-size="11">홀 4 · 분십</text>
    <text x="445" y="250" class="bsub" text-anchor="middle">A3144</text>
    <text x="445" y="263" class="bsub" text-anchor="middle">D19 (INT4)</text>

    <rect x="510" y="215" width="110" height="55" class="sens" rx="4"/>
    <text x="565" y="232" class="bname" text-anchor="middle" font-size="11">홀 5 · 분일</text>
    <text x="565" y="250" class="bsub" text-anchor="middle">A3144 (PCINT)</text>
    <text x="565" y="263" class="bsub" text-anchor="middle">D50</text>

    <rect x="630" y="215" width="110" height="55" class="sens" rx="4"/>
    <text x="685" y="232" class="bname" text-anchor="middle" font-size="11">홀 6 · 날씨</text>
    <text x="685" y="250" class="bsub" text-anchor="middle">A3144 (PCINT)</text>
    <text x="685" y="263" class="bsub" text-anchor="middle">D51</text>
  </g>

  <line x1="380" y1="270" x2="380" y2="320" stroke="#0d7a3f" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="388" y="295" class="note" fill="#0d7a3f">6 × GPIO (INT 4개 + PCINT 2개)</text>

  <!-- ============ Mega 2560 WiFi R3 center ============ -->
  <rect x="240" y="320" width="280" height="130" class="mega" rx="6"/>
  <text x="380" y="342" class="bname" text-anchor="middle">Arduino Mega 2560 WiFi R3</text>
  <text x="380" y="358" class="bsub" text-anchor="middle">단일 보드 · 5V 로직 · Arduino C++</text>

  <!-- Inner ATmega2560 -->
  <rect x="258" y="370" width="124" height="66" class="mcu_inner" rx="4"/>
  <text x="320" y="386" class="bname" text-anchor="middle" font-size="11">ATmega2560</text>
  <text x="320" y="400" class="bsub" text-anchor="middle">54 GPIO · 8KB RAM</text>
  <text x="320" y="414" class="bsub" text-anchor="middle">I2C · 4× UART · PWM</text>
  <text x="320" y="428" class="bsub" text-anchor="middle">AccelStepper · RTClib</text>

  <!-- Inner ESP8266 -->
  <rect x="388" y="370" width="114" height="66" class="mcu_inner" rx="4"/>
  <text x="445" y="386" class="bname" text-anchor="middle" font-size="11">ESP8266</text>
  <text x="445" y="400" class="bsub" text-anchor="middle">AT 커맨드</text>
  <text x="445" y="414" class="bsub" text-anchor="middle">WiFiEspAT</text>
  <text x="445" y="428" class="bsub" text-anchor="middle">APSTA (CWMODE=3)</text>

  <!-- UART between inner blocks -->
  <line x1="382" y1="403" x2="388" y2="403" stroke="#2255aa" stroke-width="1.2"/>
  <text x="385" y="448" class="iface" text-anchor="middle">Serial3 (D14/D15) · DIP SW</text>

  <!-- Network lines to ESP8266 box -->
  <line x1="140" y1="160" x2="140" y2="190" stroke="#0d7a3f" stroke-width="1.2"/>
  <line x1="370" y1="160" x2="370" y2="190" stroke="#0d7a3f" stroke-width="1.2"/>
  <line x1="140" y1="190" x2="445" y2="190" stroke="#0d7a3f" stroke-width="1.2"/>
  <line x1="370" y1="190" x2="370" y2="205" stroke="#0d7a3f" stroke-width="0"/>
  <line x1="445" y1="190" x2="445" y2="370" stroke="#0d7a3f" stroke-width="1.2"/>
  <text x="455" y="310" class="note" fill="#0d7a3f">WiFi 2.4GHz</text>

  <!-- ============ LED bar (left of Mega) ============ -->
  <rect x="30" y="335" width="180" height="100" class="led_box" rx="4"/>
  <text x="120" y="355" class="bname" text-anchor="middle">LED 업라이트 바</text>
  <text x="120" y="370" class="bsub" text-anchor="middle">5V, 확산 커버, 앞쪽 하단</text>
  <text x="120" y="384" class="bsub" text-anchor="middle">엣지라이팅 · 6 자리 공통</text>
  <line x1="60" y1="395" x2="180" y2="395" stroke="#b35800" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="120" y="410" class="bsub" text-anchor="middle">IRLZ44N MOSFET (로우사이드)</text>
  <text x="120" y="423" class="bsub" text-anchor="middle">게이트 220Ω · 풀다운 10kΩ</text>

  <line x1="210" y1="385" x2="240" y2="385" stroke="#b35800" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="213" y="380" class="iface">D11 PWM</text>

  <!-- ============ Power (right of Mega) ============ -->
  <rect x="550" y="335" width="180" height="100" class="pwr_box" rx="4"/>
  <text x="640" y="355" class="bname" text-anchor="middle">5V 3A DC 어댑터</text>
  <text x="640" y="370" class="bsub" text-anchor="middle">2.1mm 바렐잭</text>
  <text x="640" y="388" class="bsub" text-anchor="middle">Mega · ESP8266</text>
  <text x="640" y="402" class="bsub" text-anchor="middle">28BYJ-48 × 6</text>
  <text x="640" y="416" class="bsub" text-anchor="middle">LED 바 · DS3231</text>
  <text x="640" y="430" class="bsub" text-anchor="middle">공통 GND</text>

  <line x1="550" y1="385" x2="520" y2="385" stroke="#b35800" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="525" y="380" class="iface">5V</text>

  <!-- ============ I2C bus (below Mega) ============ -->
  <text x="20" y="485" class="iface">── I2C 버스 (SDA=D20, SCL=D21) ──</text>

  <rect x="290" y="500" width="180" height="55" class="box" rx="4"/>
  <text x="380" y="520" class="bname" text-anchor="middle">DS3231 RTC</text>
  <text x="380" y="535" class="bsub" text-anchor="middle">주소 0x68 · CR2032 백업</text>
  <text x="380" y="549" class="bsub" text-anchor="middle" fill="#b33">⚠ R5 (200Ω) 제거 필수</text>

  <line x1="380" y1="450" x2="380" y2="500" stroke="#2255aa" stroke-width="1.2"/>
  <text x="388" y="478" class="iface">I2C</text>

  <!-- ============ Motors (below) ============ -->
  <text x="20" y="595" class="iface">── 스텝 모터 × 6 (ULN2003 + 28BYJ-48, 각 4핀 Mega 직결) ──</text>

  <g>
    <rect x="30" y="610" width="110" height="95" class="motor" rx="4"/>
    <text x="85" y="628" class="bname" text-anchor="middle" font-size="11">드럼 1 · 요일</text>
    <text x="85" y="644" class="bsub" text-anchor="middle">∅60 · 7면</text>
    <text x="85" y="662" class="bsub" text-anchor="middle">ULN2003</text>
    <text x="85" y="676" class="bsub" text-anchor="middle">28BYJ-48</text>
    <text x="85" y="695" class="bsub" text-anchor="middle" fill="#b35800">D22~D25</text>

    <rect x="150" y="610" width="110" height="95" class="motor" rx="4"/>
    <text x="205" y="628" class="bname" text-anchor="middle" font-size="11">드럼 2 · 시십</text>
    <text x="205" y="644" class="bsub" text-anchor="middle">∅90 · 10면</text>
    <text x="205" y="676" class="bsub" text-anchor="middle">28BYJ-48</text>
    <text x="205" y="695" class="bsub" text-anchor="middle" fill="#b35800">D26~D29</text>

    <rect x="270" y="610" width="110" height="95" class="motor" rx="4"/>
    <text x="325" y="628" class="bname" text-anchor="middle" font-size="11">드럼 3 · 시일</text>
    <text x="325" y="644" class="bsub" text-anchor="middle">∅90 · 10면</text>
    <text x="325" y="676" class="bsub" text-anchor="middle">28BYJ-48</text>
    <text x="325" y="695" class="bsub" text-anchor="middle" fill="#b35800">D30~D33</text>

    <rect x="390" y="610" width="110" height="95" class="motor" rx="4"/>
    <text x="445" y="628" class="bname" text-anchor="middle" font-size="11">드럼 4 · 분십</text>
    <text x="445" y="644" class="bsub" text-anchor="middle">∅90 · 10면</text>
    <text x="445" y="676" class="bsub" text-anchor="middle">28BYJ-48</text>
    <text x="445" y="695" class="bsub" text-anchor="middle" fill="#b35800">D34~D37</text>

    <rect x="510" y="610" width="110" height="95" class="motor" rx="4"/>
    <text x="565" y="628" class="bname" text-anchor="middle" font-size="11">드럼 5 · 분일</text>
    <text x="565" y="644" class="bsub" text-anchor="middle">∅90 · 10면</text>
    <text x="565" y="676" class="bsub" text-anchor="middle">28BYJ-48</text>
    <text x="565" y="695" class="bsub" text-anchor="middle" fill="#b35800">D38~D41</text>

    <rect x="630" y="610" width="110" height="95" class="motor" rx="4"/>
    <text x="685" y="628" class="bname" text-anchor="middle" font-size="11">드럼 6 · 날씨</text>
    <text x="685" y="644" class="bsub" text-anchor="middle">∅60 · 7면</text>
    <text x="685" y="676" class="bsub" text-anchor="middle">28BYJ-48</text>
    <text x="685" y="695" class="bsub" text-anchor="middle" fill="#b35800">D42~D45</text>
  </g>

  <line x1="380" y1="555" x2="380" y2="585" stroke="#c99400" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="85" y1="585" x2="685" y2="585" stroke="#c99400" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="85" y1="585" x2="85" y2="610" stroke="#c99400" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="205" y1="585" x2="205" y2="610" stroke="#c99400" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="325" y1="585" x2="325" y2="610" stroke="#c99400" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="445" y1="585" x2="445" y2="610" stroke="#c99400" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="565" y1="585" x2="565" y2="610" stroke="#c99400" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="685" y1="585" x2="685" y2="610" stroke="#c99400" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="600" y="578" class="note" fill="#b35800">6 × 4핀 = 24 GPIO 직결</text>

  <!-- Summary table at bottom -->
  <g transform="translate(20, 735)">
    <rect x="0" y="0" width="720" height="110" fill="#fafbfc" stroke="#ccc"/>
    <text x="10" y="20" class="bname" font-size="12">핀 할당 요약 (Mega 2560 직결, 레벨 시프터·GPIO 확장 불필요)</text>
    <text x="10" y="40" class="bsub">· I2C: SDA = D20 / SCL = D21 → DS3231 (0x68) 단독</text>
    <text x="10" y="56" class="bsub">· 모터 × 6 (ULN2003 IN1~IN4): D22~D25, D26~D29, D30~D33, D34~D37, D38~D41, D42~D45</text>
    <text x="10" y="72" class="bsub">· 홀센서 × 6 (인터럽트): D2, D3, D18, D19 (외부 INT) + D50, D51 (PCINT)</text>
    <text x="10" y="88" class="bsub">· LED PWM: D11 → MOSFET 게이트 (220Ω) + 풀다운 10kΩ</text>
    <text x="10" y="104" class="bsub">· ESP8266 UART: Serial3 (TX=D14, RX=D15) · 보드 DIP 스위치로 배선 확정</text>
  </g>
</svg>
