<svg viewBox="0 0 640 1180" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa; max-width:100%; height:auto; font-family: system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8a500"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#2255aa"/>
    </marker>
    <marker id="arBs" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8 z" fill="#2255aa"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 17px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 12px; fill: #555; }
    .lbl { font-size: 11px; fill: #333; font-weight: 600; }
    .dim { font-size: 11px; fill: #2255aa; font-weight: 600; }
    .hid { font-size: 11px; fill: #a02020; font-weight: 600; }
    .note { font-size: 10px; fill: #888; font-style: italic; }
  </style>

  <!-- ============ Panel 1: Top view ============ -->
  <g>
    <rect x="0" y="0" width="640" height="560" fill="#fff" stroke="#e0e0e0"/>
    <text x="20" y="28" class="title">1. 하부 캡 · 상면도 (위에서 ↓ 본 시점)</text>
    <text x="20" y="46" class="sub">∅90 × 두께 6mm · 10 슬롯 3.2×28mm 관통 · 축 홀 ∅5 + M3 세트스크류 · 자석 포켓(밑면)</text>

    <!-- Decagon outline -->
    <polygon 
      points="361.72,408.42 278.28,408.42 210.76,359.39 185,280 210.76,200.61 278.28,151.58 361.72,151.58 429.24,200.61 455,280 429.24,359.39"
      fill="#eef2f7" stroke="#2f5179" stroke-width="2"/>

    <!-- 10 slots using rotate transform -->
    <g fill="#b8c6d6" stroke="#2f5179" stroke-width="0.8">
      <rect x="278.28" y="398.82" width="83.44" height="9.6"/>
      <g transform="rotate(36 320 280)"><rect x="278.28" y="398.82" width="83.44" height="9.6"/></g>
      <g transform="rotate(72 320 280)"><rect x="278.28" y="398.82" width="83.44" height="9.6"/></g>
      <g transform="rotate(108 320 280)"><rect x="278.28" y="398.82" width="83.44" height="9.6"/></g>
      <g transform="rotate(144 320 280)"><rect x="278.28" y="398.82" width="83.44" height="9.6"/></g>
      <g transform="rotate(180 320 280)"><rect x="278.28" y="398.82" width="83.44" height="9.6"/></g>
      <g transform="rotate(216 320 280)"><rect x="278.28" y="398.82" width="83.44" height="9.6"/></g>
      <g transform="rotate(252 320 280)"><rect x="278.28" y="398.82" width="83.44" height="9.6"/></g>
      <g transform="rotate(288 320 280)"><rect x="278.28" y="398.82" width="83.44" height="9.6"/></g>
      <g transform="rotate(324 320 280)"><rect x="278.28" y="398.82" width="83.44" height="9.6"/></g>
    </g>

    <!-- Slot # labels on a few slots -->
    <text x="320" y="383" class="lbl" text-anchor="middle">0</text>
    <text x="260" y="366" class="note" text-anchor="middle">1</text>
    <text x="380" y="366" class="note" text-anchor="middle">9</text>
    <text x="223" y="323" class="note" text-anchor="middle">2</text>
    <text x="417" y="323" class="note" text-anchor="middle">8</text>
    <text x="320" y="183" class="note" text-anchor="middle">5</text>

    <!-- Center hub -->
    <circle cx="320" cy="280" r="30" fill="#d0dae7" stroke="#5a7aa0" stroke-width="1.5"/>
    <circle cx="320" cy="280" r="7.5" fill="#fff" stroke="#333" stroke-width="1.2"/>
    <!-- Hub label -->
    <text x="320" y="283" class="note" text-anchor="middle" font-size="8">축 ∅5</text>
    
    <!-- Set screw M3 (on hub side, shown as small hole at edge of hub) -->
    <circle cx="349" cy="280" r="3.5" fill="#fff" stroke="#333" stroke-width="1"/>
    <text x="360" y="283" class="sub" font-size="10">M3 세트스크류</text>
    <text x="360" y="296" class="note" font-size="9">(축 고정 · 캡 분리용)</text>

    <!-- Magnet pocket (hidden on underside, dashed) -->
    <circle cx="320" cy="370" r="6" fill="none" stroke="#a02020" stroke-width="1.3" stroke-dasharray="3,2"/>
    <line x1="326" y1="370" x2="380" y2="370" stroke="#a02020" stroke-width="0.6"/>
    <text x="385" y="368" class="hid">자석 포켓</text>
    <text x="385" y="381" class="note" fill="#a02020">∅4×2 (밑면, 은폐)</text>
    <text x="385" y="393" class="note" fill="#a02020">중심 반경 30mm</text>

    <!-- Section cut line A-A -->
    <line x1="30" y1="280" x2="610" y2="280" stroke="#a02020" stroke-width="0.7" stroke-dasharray="10,3,2,3"/>
    <text x="30" y="272" class="hid">A</text>
    <text x="600" y="272" class="hid">A</text>

    <!-- Callout: slot dim -->
    <line x1="320" y1="404" x2="320" y2="462" stroke="#2255aa" stroke-width="0.6"/>
    <line x1="278" y1="408.42" x2="278" y2="475" stroke="#2255aa" stroke-width="0.5" stroke-dasharray="3,2"/>
    <line x1="362" y1="408.42" x2="362" y2="475" stroke="#2255aa" stroke-width="0.5" stroke-dasharray="3,2"/>
    <line x1="278" y1="470" x2="362" y2="470" stroke="#2255aa" stroke-width="0.7" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <text x="320" y="487" class="dim" text-anchor="middle">28mm (면 폭)</text>
    
    <!-- Slot width detail call-out -->
    <line x1="362" y1="403.6" x2="480" y2="430" stroke="#2255aa" stroke-width="0.5"/>
    <text x="485" y="434" class="dim">슬롯 폭 3.2mm</text>
    <text x="485" y="447" class="note">(아크릴 3mm + 0.2 여유)</text>

    <!-- Diameter -->
    <line x1="185" y1="518" x2="455" y2="518" stroke="#2255aa" stroke-width="0.8" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <text x="320" y="535" class="dim" text-anchor="middle">∅ 90mm (vertex 기준)</text>

    <!-- Note at top right -->
    <text x="20" y="75" class="note">※ 상부 캡도 동일 형상, 자석 포켓만 없음. 상부 캡을 나사 3개로 분리 → 패널 탈부착 가능.</text>
  </g>

  <!-- ============ Panel 2: Section A-A ============ -->
  <g transform="translate(0,560)">
    <rect x="0" y="0" width="640" height="620" fill="#fff" stroke="#e0e0e0"/>
    <text x="20" y="28" class="title">2. 단면 A-A · 슬롯·패널·자석·홀센서</text>
    <text x="20" y="46" class="sub">수평 컷 · 앞(왼쪽)/뒤(오른쪽) 두 슬롯 가시 · 축·자석·홀센서 관계</text>

    <!-- Break line at top: showing panel continues up into drum -->
    <text x="50" y="110" class="note">↑ 드럼 내부로 연장 (전체 L=50mm)</text>

    <!-- Scale: 1mm = 6px for detail -->
    <!-- Cap width 90mm = 540px, centered at x=320 -->
    <!-- Cap from x=50 to x=590 -->
    <!-- Cap thickness 6mm = 36px, y=250 to y=286 -->

    <!-- Cap body (with 3 cutouts: 2 slots + 1 shaft hole) -->
    <!-- Part 1: left end to slot 0 -->
    <!-- Slot 0 at x=50 to x=69.2 (3.2mm × 6) -->
    <!-- Wait, slot width = 3.2mm = 19.2px. At left edge, slot x=50 to 69.2. -->
    <!-- Cap material from x=69.2 to shaft-hole-left -->
    <!-- Shaft hole ∅5 = 30px wide, centered at 320, so x=305 to x=335 -->
    <!-- Cap material from x=335 to slot-5-left at x=570.8 -->
    <!-- Slot 5 at x=570.8 to x=590 -->

    <!-- Draw cap as 3 rectangles -->
    <rect x="69.2" y="250" width="235.8" height="36" fill="#d0dae7" stroke="#5a7aa0" stroke-width="1.3"/>
    <rect x="335" y="250" width="235.8" height="36" fill="#d0dae7" stroke="#5a7aa0" stroke-width="1.3"/>

    <!-- Magnet pocket: blind hole from bottom, ∅4 x 2mm deep -->
    <!-- Position: at 30mm from center, on front (left) side -->
    <!-- x = 320 - 30*6 = 140, ∅24px = width -->
    <!-- Pocket from x=128 to x=152, y=274 to y=286 (12px deep = 2mm) -->
    <path d="M 128 286 L 128 274 L 152 274 L 152 286" fill="#2d2d2d" stroke="#000" stroke-width="0.8"/>
    <!-- Magnet inserted in pocket -->
    <rect x="130" y="276" width="20" height="8" fill="#556" stroke="#333" stroke-width="0.6"/>
    <text x="140" y="283" class="note" text-anchor="middle" font-size="8" fill="#fff">N/S</text>

    <!-- Slot label arrows -->
    <text x="45" y="246" class="sub">슬롯 0</text>
    <text x="45" y="258" class="note">(앞/뷰어)</text>
    <text x="575" y="246" class="sub">슬롯 5</text>
    <text x="555" y="258" class="note">(뒤)</text>

    <!-- Shaft (vertical cylinder through middle) -->
    <line x1="320" y1="130" x2="320" y2="400" stroke="#444" stroke-width="9"/>
    <text x="335" y="155" class="dim">축 ∅5mm</text>

    <!-- Front panel through slot 0 -->
    <rect x="50.6" y="120" width="18" height="186" fill="#e6f0fa" stroke="#2f5179" stroke-width="0.8" opacity="0.9"/>
    <!-- Reflective sheet on the back (inner) face of front panel = right side -->
    <line x1="68.6" y1="120" x2="68.6" y2="306" stroke="#888" stroke-width="2.2" stroke-dasharray="2,1.5"/>
    <text x="85" y="140" class="sub">반사 시트</text>
    <text x="85" y="153" class="note">(내측 면)</text>

    <!-- Engraved digit glow area on front panel (visible portion above cap) -->
    <rect x="55" y="165" width="10" height="70" fill="#ffd83d" opacity="0.85"/>
    <text x="35" y="200" class="sub" text-anchor="end">각인</text>
    <text x="35" y="213" class="note" text-anchor="end">발광</text>

    <!-- Front panel extension below cap = exposed edge -->
    <line x1="60" y1="298" x2="60" y2="306" stroke="#e8a500" stroke-width="4"/>
    <text x="65" y="320" class="lbl" fill="#b37400">↓ 노출 엣지 2mm</text>
    <text x="65" y="333" class="note" fill="#b37400">(광 주입구)</text>

    <!-- Back panel through slot 5 -->
    <rect x="571.4" y="120" width="18" height="186" fill="#e6f0fa" stroke="#2f5179" stroke-width="0.8" opacity="0.5"/>
    <line x1="571.4" y1="120" x2="571.4" y2="306" stroke="#888" stroke-width="2.2" stroke-dasharray="2,1.5" opacity="0.6"/>

    <!-- LED bar (in front of drum, below cap, at front face side) -->
    <rect x="30" y="345" width="80" height="10" fill="#fff1a0" stroke="#c99400"/>
    <text x="45" y="368" class="sub">LED 바 (5V)</text>

    <!-- Light rays from LED up to exposed edge of front panel -->
    <line x1="50" y1="343" x2="58" y2="308" stroke="#e8a500" stroke-width="1.4" marker-end="url(#ar)"/>
    <line x1="70" y1="343" x2="60" y2="308" stroke="#e8a500" stroke-width="1.4" marker-end="url(#ar)"/>
    <line x1="95" y1="343" x2="62" y2="308" stroke="#e8a500" stroke-width="1.4" marker-end="url(#ar)"/>

    <!-- Hall sensor on frame below cap -->
    <!-- Frame bar -->
    <line x1="30" y1="420" x2="610" y2="420" stroke="#666" stroke-width="2"/>
    <text x="530" y="415" class="sub">프레임 (고정)</text>
    <!-- Hall sensor PCB + sensor chip -->
    <rect x="122" y="393" width="36" height="10" fill="#2a6c38" stroke="#163d1e" stroke-width="0.8"/>
    <rect x="134" y="388" width="12" height="8" fill="#222" stroke="#000" stroke-width="0.6"/>
    <text x="155" y="390" class="sub">홀센서 A3144</text>
    <text x="162" y="403" class="note">(센서 칩 + PCB)</text>

    <!-- Distance annotation: magnet to hall sensor gap -->
    <line x1="200" y1="285" x2="200" y2="388" stroke="#2255aa" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="205" y="340" class="dim">gap</text>
    <text x="205" y="353" class="note">1–2mm</text>

    <!-- Rotation indicator -->
    <path d="M 140 440 A 25 25 0 1 0 140 441" fill="none" stroke="#d48c00" stroke-width="1.5" marker-end="url(#ar)"/>
    <text x="175" y="455" class="sub" fill="#b37400">자석은 드럼과 함께 회전</text>
    <text x="175" y="468" class="note" fill="#b37400">→ 1회전당 1펄스 (홈 감지)</text>

    <!-- Cap thickness dimension -->
    <line x1="620" y1="250" x2="620" y2="286" stroke="#2255aa" stroke-width="0.6" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <text x="605" y="272" class="dim" text-anchor="end">6mm</text>

    <!-- Panel exposed dimension -->
    <line x1="20" y1="286" x2="20" y2="306" stroke="#2255aa" stroke-width="0.6" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <text x="15" y="302" class="dim" text-anchor="end">2</text>

    <!-- Magnet callout -->
    <line x1="140" y1="286" x2="140" y2="490" stroke="#a02020" stroke-width="0.4" stroke-dasharray="3,2"/>
    <text x="150" y="495" class="hid">자석 ∅4×2 (압입)</text>
    <text x="150" y="508" class="note" fill="#a02020">중심에서 반경 30mm</text>

    <!-- Assembly note -->
    <text x="20" y="545" class="lbl">조립/교체 순서:</text>
    <text x="20" y="562" class="sub">① 하부 캡을 축에 끼우고 M3 세트스크류로 고정</text>
    <text x="20" y="578" class="sub">② 10개 아크릴 패널을 하부 슬롯에 위로 ↑ 삽입 (패널 하단 2mm 노출)</text>
    <text x="20" y="594" class="sub">③ 상부 캡을 덮고 3개 M3 나사로 축 허브에 체결</text>
    <text x="20" y="610" class="sub">→ 교체 시 ③번만 풀어 상부 캡 분리 → 패널을 위로 빼내 교체</text>
  </g>
</svg>
