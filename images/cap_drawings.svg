<svg viewBox="0 0 640 1580" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa; max-width:100%; height:auto; font-family: system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8a500"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#2255aa"/>
    </marker>
    <marker id="arBs" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8 z" fill="#2255aa"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 17px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 12px; fill: #666; }
    .section { font-size: 13px; font-weight: 700; fill: #2a3d55; }
    .dim { font-size: 10px; font-weight: 600; fill: #2255aa; }
    .dimval { font-size: 12px; font-weight: 700; fill: #2255aa; }
    .lbl { font-size: 10px; fill: #333; }
    .hid { font-size: 10px; fill: #a02020; font-weight: 600; }
    .note { font-size: 9px; fill: #777; }
    .tblh { font-size: 11px; font-weight: 700; fill: #2a3d55; }
    .tblr { font-size: 10px; fill: #333; }
    .tblm { font-size: 10px; fill: #a02020; }
  </style>

  <!-- ========= SECTION 1: ∅90 CAP ========= -->
  <g>
    <rect x="0" y="0" width="640" height="770" fill="#fff" stroke="#e0e0e0"/>
    <text x="20" y="28" class="title">1. ∅90 캡 (HH:MM 드럼 · 4개 × 상하 = 8개 필요)</text>
    <text x="20" y="46" class="subtitle">10면 decagon · 두께 6mm · 상·하부 공통 · 하부만 자석 포켓 추가</text>

    <!-- === Plan view === -->
    <text x="20" y="78" class="section">평면도 (상면에서 ↓ 본 시점)</text>

    <!-- Decagon outline -->
    <polygon
      points="261.72,418.40 178.28,418.40 110.78,369.35 85,290 110.78,210.65 178.28,161.60 261.72,161.60 329.22,210.65 355,290 329.22,369.35"
      fill="#eef2f7" stroke="#2f5179" stroke-width="1.8"/>

    <!-- 10 slots -->
    <g fill="#b8c6d6" stroke="#2f5179" stroke-width="0.8">
      <rect x="182.16" y="408.80" width="75.69" height="9.6"/>
      <g transform="rotate(36 220 290)"><rect x="182.16" y="408.80" width="75.69" height="9.6"/></g>
      <g transform="rotate(72 220 290)"><rect x="182.16" y="408.80" width="75.69" height="9.6"/></g>
      <g transform="rotate(108 220 290)"><rect x="182.16" y="408.80" width="75.69" height="9.6"/></g>
      <g transform="rotate(144 220 290)"><rect x="182.16" y="408.80" width="75.69" height="9.6"/></g>
      <g transform="rotate(180 220 290)"><rect x="182.16" y="408.80" width="75.69" height="9.6"/></g>
      <g transform="rotate(216 220 290)"><rect x="182.16" y="408.80" width="75.69" height="9.6"/></g>
      <g transform="rotate(252 220 290)"><rect x="182.16" y="408.80" width="75.69" height="9.6"/></g>
      <g transform="rotate(288 220 290)"><rect x="182.16" y="408.80" width="75.69" height="9.6"/></g>
      <g transform="rotate(324 220 290)"><rect x="182.16" y="408.80" width="75.69" height="9.6"/></g>
    </g>

    <!-- Slot numbering -->
    <text x="220" y="392" class="lbl" text-anchor="middle" font-weight="700">0</text>
    <text x="330" y="334" class="note" text-anchor="middle">9</text>
    <text x="110" y="334" class="note" text-anchor="middle">1</text>
    <text x="220" y="192" class="note" text-anchor="middle">5</text>

    <!-- Hub -->
    <circle cx="220" cy="290" r="30" fill="#d0dae7" stroke="#5a7aa0" stroke-width="1.5"/>
    <!-- Shaft hole -->
    <circle cx="220" cy="290" r="7.5" fill="#fff" stroke="#333" stroke-width="1.2"/>
    <text x="220" y="292" class="note" text-anchor="middle" font-size="8">∅5</text>

    <!-- Heat insert indicator (projected on top view) -->
    <line x1="250" y1="290" x2="230" y2="290" stroke="#333" stroke-width="0.7" stroke-dasharray="2,1.5"/>
    <circle cx="250" cy="290" r="2" fill="#333"/>

    <!-- Magnet pocket (hidden, dashed) at R30 from center, angle 90° -->
    <circle cx="220" cy="380" r="6" fill="none" stroke="#a02020" stroke-width="1.3" stroke-dasharray="3,2"/>
    <text x="220" y="382" class="hid" font-size="9" text-anchor="middle">M</text>

    <!-- Section cut line A-A -->
    <line x1="60" y1="290" x2="380" y2="290" stroke="#a02020" stroke-width="0.7" stroke-dasharray="10,3,2,3"/>
    <text x="65" y="283" class="hid">A</text>
    <text x="373" y="283" class="hid">A</text>

    <!-- Dimensions on plan view -->
    <!-- Outer diameter -->
    <line x1="85" y1="480" x2="355" y2="480" stroke="#2255aa" stroke-width="0.7" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <line x1="85" y1="290" x2="85" y2="480" stroke="#2255aa" stroke-width="0.4" stroke-dasharray="3,2" opacity="0.6"/>
    <line x1="355" y1="290" x2="355" y2="480" stroke="#2255aa" stroke-width="0.4" stroke-dasharray="3,2" opacity="0.6"/>
    <text x="220" y="497" class="dimval" text-anchor="middle">∅90</text>

    <!-- Slot width call-out -->
    <line x1="290" y1="413.6" x2="350" y2="395" stroke="#2255aa" stroke-width="0.5"/>
    <text x="355" y="394" class="dim">슬롯</text>
    <text x="355" y="406" class="dim">3.2 × 25.23</text>
    <text x="355" y="418" class="note">10개 / 36° 피치</text>
    <text x="355" y="430" class="note">(radial × tangential)</text>

    <!-- Hub detail -->
    <line x1="250" y1="290" x2="375" y2="280" stroke="#2255aa" stroke-width="0.5"/>
    <text x="380" y="278" class="dim">허브 ∅20</text>
    <text x="380" y="290" class="dim">축 ∅5</text>
    <text x="380" y="302" class="dim">M3 heat insert</text>
    <text x="380" y="312" class="note">(허브 측면 관통)</text>

    <!-- Magnet annotation -->
    <line x1="220" y1="290" x2="220" y2="380" stroke="#2255aa" stroke-width="0.4" stroke-dasharray="3,2"/>
    <text x="200" y="335" class="dim" text-anchor="end">R30</text>
    <text x="200" y="347" class="hid" text-anchor="end" font-size="9">자석 포켓</text>
    <text x="200" y="358" class="note" text-anchor="end">(하부 캡만)</text>

    <!-- Angular position of slot 0 -->
    <text x="375" y="340" class="note">슬롯 0 ≡ 자석</text>
    <text x="375" y="351" class="note">각도 일치 (홈 기준)</text>

    <!-- === Dimensions table === -->
    <g transform="translate(450, 100)">
      <rect width="175" height="365" fill="#fafbfc" stroke="#ccc"/>
      <text x="10" y="20" class="tblh">주요 치수 (mm)</text>
      <line x1="10" y1="28" x2="165" y2="28" stroke="#bbb"/>
      <text x="10" y="46" class="tblr">외경 ∅ = 90</text>
      <text x="10" y="62" class="tblr">두께 = 6</text>
      <text x="10" y="86" class="tblr">슬롯 10개 (관통)</text>
      <text x="20" y="100" class="tblr">폭 = 3.2 (+0.1/-0)</text>
      <text x="20" y="114" class="tblr">길이 = 28</text>
      <text x="20" y="128" class="tblr">피치각 = 36°</text>
      <text x="10" y="152" class="tblr">축 홀 ∅5 (+0.2/-0)</text>
      <text x="10" y="168" class="tblr">허브 외경 ∅20</text>
      <text x="10" y="192" class="tblr">M3 heat insert 1개</text>
      <text x="20" y="206" class="tblr">인서트 ∅4.0</text>
      <text x="20" y="220" class="tblr">허브 외측→축 홀</text>
      <text x="10" y="244" class="tblm">── 하부 캡만 ──</text>
      <text x="10" y="258" class="tblm">자석 포켓:</text>
      <text x="20" y="272" class="tblm">∅4.1 × 깊이 2</text>
      <text x="20" y="286" class="tblm">blind (하면 기준)</text>
      <text x="20" y="300" class="tblm">R30 (중심→포켓)</text>
      <text x="20" y="314" class="tblm">슬롯 0과 각도 일치</text>
      <text x="10" y="340" class="note">※ 재료: PETG / ABS</text>
      <text x="10" y="354" class="note">※ 레이어 ≤ 0.2mm</text>
    </g>

    <!-- === Section A-A === -->
    <text x="20" y="550" class="section">단면 A-A</text>

    <!-- 
      Section view: cap horizontal, 6mm thick
      Scale 5px/mm · cap width 450px · centered at (320, 620)
      Cap x: 95 ~ 545
      Cap y: 605 ~ 635
      Slot 0 at x=95 to 111 (3.2mm=16px)
      Slot 5 at x=529 to 545
      Shaft hole: ∅5mm=25px centered at x=320 → x=307.5 to 332.5
    -->

    <!-- Cap body (3 parts with cutouts) -->
    <rect x="111" y="605" width="196.5" height="30" fill="#d0dae7" stroke="#5a7aa0" stroke-width="1.2"/>
    <rect x="332.5" y="605" width="196.5" height="30" fill="#d0dae7" stroke="#5a7aa0" stroke-width="1.2"/>

    <!-- Hub boss (∅20 × 6mm) above cap top, centered. Scale 5px/mm → 100px wide × 30px tall -->
    <rect x="270" y="545" width="100" height="60" fill="#c3d1e3" stroke="#5a7aa0" stroke-width="1.2"/>
    <text x="320" y="538" class="lbl" text-anchor="middle">허브 보스 ∅20 × 12</text>

    <!-- Slot labels above (moved up since boss covers original area) -->
    <text x="103" y="598" class="lbl" text-anchor="middle">슬롯 0</text>
    <text x="537" y="598" class="lbl" text-anchor="middle">슬롯 5</text>

    <!-- Shaft (extended up through boss) -->
    <line x1="320" y1="540" x2="320" y2="675" stroke="#444" stroke-width="7"/>
    <text x="334" y="555" class="dim">축 ∅5</text>

    <!-- M3 heat insert hole through boss midheight (z=12, y=575 in drawing) -->
    <rect x="295" y="570" width="50" height="10" fill="#fffbe7" stroke="#333" stroke-width="0.8"/>
    <text x="350" y="578" class="note">M3 홀 (보스 중앙 z=12)</text>

    <!-- Magnet pocket (hatched, on underside) -->
    <!-- R30 from center = 150px at scale 5px/mm → x=170 -->
    <rect x="160" y="625" width="20" height="10" fill="#2d2d2d" stroke="#000" stroke-width="0.5"/>
    <rect x="162" y="627" width="16" height="6" fill="#556"/>
    <text x="170" y="632" class="note" text-anchor="middle" fill="#fff" font-size="7">자석</text>
    <text x="170" y="655" class="hid" text-anchor="middle" font-size="9">자석 ∅4×2</text>
    <text x="170" y="667" class="note" text-anchor="middle" fill="#a02020">(하부 캡만)</text>

    <!-- Thickness dim -->
    <line x1="560" y1="605" x2="560" y2="635" stroke="#2255aa" stroke-width="0.7" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <text x="568" y="623" class="dimval">6</text>

    <!-- Pocket depth dim -->
    <line x1="80" y1="625" x2="80" y2="635" stroke="#2255aa" stroke-width="0.7" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <text x="72" y="633" class="dim" text-anchor="end">2</text>

    <!-- Slot thru note -->
    <line x1="103" y1="635" x2="103" y2="660" stroke="#2255aa" stroke-width="0.4" stroke-dasharray="2,2"/>
    <text x="103" y="672" class="note" text-anchor="middle">관통</text>

    <!-- Note at bottom -->
    <text x="20" y="735" class="note">※ 하부 캡: 슬롯 6mm 관통. 상부 캡: 슬롯 깊이 3mm Blind (관통 X) — 패널 위쪽 끝이 캡 안에서 멈춤.</text>
    <text x="20" y="748" class="note">※ 상부 캡 탈착으로 패널 교체 — M3 세트스크류 풀고 축 방향으로 슬라이드 탈거.</text>
  </g>

  <!-- ========= SECTION 2: ∅60 CAP ========= -->
  <g transform="translate(0,770)">
    <rect x="0" y="0" width="640" height="810" fill="#fff" stroke="#e0e0e0"/>
    <text x="20" y="28" class="title">2. ∅60 캡 (요일·날씨 드럼 · 2개 × 상하 = 4개 필요)</text>
    <text x="20" y="46" class="subtitle">7면 heptagon · 두께 6mm · 상·하부 공통 · 하부만 자석 포켓 추가</text>

    <!-- === Plan view === -->
    <text x="20" y="78" class="section">평면도</text>

    <!-- Heptagon centered at (220, 290), radius 90 (scale 3px/mm) -->
    <polygon
      points="259.05,371.09 180.95,371.09 132.26,310.03 149.64,233.88 220,200 290.36,233.88 307.74,310.03"
      fill="#eef2f7" stroke="#2f5179" stroke-width="1.8"/>

    <!-- 7 slots -->
    <g fill="#b8c6d6" stroke="#2f5179" stroke-width="0.8">
      <rect x="186.34" y="361.49" width="67.32" height="9.6"/>
      <g transform="rotate(51.43 220 290)"><rect x="186.34" y="361.49" width="67.32" height="9.6"/></g>
      <g transform="rotate(102.86 220 290)"><rect x="186.34" y="361.49" width="67.32" height="9.6"/></g>
      <g transform="rotate(154.29 220 290)"><rect x="186.34" y="361.49" width="67.32" height="9.6"/></g>
      <g transform="rotate(205.71 220 290)"><rect x="186.34" y="361.49" width="67.32" height="9.6"/></g>
      <g transform="rotate(257.14 220 290)"><rect x="186.34" y="361.49" width="67.32" height="9.6"/></g>
      <g transform="rotate(308.57 220 290)"><rect x="186.34" y="361.49" width="67.32" height="9.6"/></g>
    </g>

    <!-- Slot numbering -->
    <text x="220" y="350" class="lbl" text-anchor="middle" font-weight="700">0</text>
    <text x="296" y="282" class="note" text-anchor="middle">6</text>
    <text x="144" y="282" class="note" text-anchor="middle">1</text>
    <text x="220" y="232" class="note" text-anchor="middle">4</text>

    <!-- Hub (smaller) -->
    <circle cx="220" cy="290" r="22" fill="#d0dae7" stroke="#5a7aa0" stroke-width="1.5"/>
    <circle cx="220" cy="290" r="7.5" fill="#fff" stroke="#333" stroke-width="1.2"/>
    <text x="220" y="292" class="note" text-anchor="middle" font-size="8">∅5</text>

    <!-- Heat insert indicator -->
    <line x1="242" y1="290" x2="227" y2="290" stroke="#333" stroke-width="0.7" stroke-dasharray="2,1.5"/>
    <circle cx="242" cy="290" r="2" fill="#333"/>

    <!-- Magnet pocket at R15 (45px) from center -->
    <circle cx="220" cy="335" r="6" fill="none" stroke="#a02020" stroke-width="1.3" stroke-dasharray="3,2"/>
    <text x="220" y="337" class="hid" font-size="9" text-anchor="middle">M</text>

    <!-- Section cut B-B -->
    <line x1="100" y1="290" x2="340" y2="290" stroke="#a02020" stroke-width="0.7" stroke-dasharray="10,3,2,3"/>
    <text x="100" y="283" class="hid">B</text>
    <text x="335" y="283" class="hid">B</text>

    <!-- Diameter dimension -->
    <line x1="130" y1="440" x2="310" y2="440" stroke="#2255aa" stroke-width="0.7" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <line x1="130" y1="290" x2="130" y2="440" stroke="#2255aa" stroke-width="0.4" stroke-dasharray="3,2" opacity="0.6"/>
    <line x1="310" y1="290" x2="310" y2="440" stroke="#2255aa" stroke-width="0.4" stroke-dasharray="3,2" opacity="0.6"/>
    <text x="220" y="457" class="dimval" text-anchor="middle">∅60</text>

    <!-- Slot call-out -->
    <line x1="285" y1="366" x2="350" y2="375" stroke="#2255aa" stroke-width="0.5"/>
    <text x="355" y="373" class="dim">슬롯</text>
    <text x="355" y="385" class="dim">3.2 × 22.44</text>
    <text x="355" y="397" class="note">7개 / 51.43° 피치</text>
    <text x="355" y="409" class="note">(radial × tangential)</text>

    <!-- Hub details -->
    <line x1="242" y1="290" x2="375" y2="280" stroke="#2255aa" stroke-width="0.5"/>
    <text x="380" y="278" class="dim">허브 ∅18</text>
    <text x="380" y="290" class="dim">축 ∅5</text>
    <text x="380" y="302" class="dim">M3 heat insert</text>

    <!-- Magnet -->
    <line x1="220" y1="290" x2="220" y2="335" stroke="#2255aa" stroke-width="0.4" stroke-dasharray="3,2"/>
    <text x="200" y="320" class="dim" text-anchor="end">R15</text>
    <text x="200" y="332" class="hid" text-anchor="end" font-size="9">자석 포켓</text>
    <text x="200" y="343" class="note" text-anchor="end">(하부 캡만)</text>

    <!-- === Dimensions table === -->
    <g transform="translate(450, 100)">
      <rect width="175" height="375" fill="#fafbfc" stroke="#ccc"/>
      <text x="10" y="20" class="tblh">주요 치수 (mm)</text>
      <line x1="10" y1="28" x2="165" y2="28" stroke="#bbb"/>
      <text x="10" y="46" class="tblr">외경 ∅ = 60</text>
      <text x="10" y="62" class="tblr">두께 = 6</text>
      <text x="10" y="86" class="tblr">슬롯 7개 (관통)</text>
      <text x="20" y="100" class="tblr">폭 = 3.2 (+0.1/-0)</text>
      <text x="20" y="114" class="tblr">길이 = 26</text>
      <text x="20" y="128" class="tblr">피치각 = 51.43°</text>
      <text x="10" y="152" class="tblr">축 홀 ∅5 (+0.2/-0)</text>
      <text x="10" y="168" class="tblr">허브 외경 ∅18</text>
      <text x="10" y="192" class="tblr">M3 heat insert 1개</text>
      <text x="10" y="216" class="tblm">── 하부 캡만 ──</text>
      <text x="10" y="230" class="tblm">자석 포켓:</text>
      <text x="20" y="244" class="tblm">∅4.1 × 깊이 2</text>
      <text x="20" y="258" class="tblm">blind (하면 기준)</text>
      <text x="20" y="272" class="tblm">R15 (중심→포켓)</text>
      <text x="20" y="286" class="tblm">슬롯 0과 각도 일치</text>
      <text x="10" y="312" class="tblr">사용 면:</text>
      <text x="20" y="326" class="tblr">요일: 7면 (일~토)</text>
      <text x="20" y="340" class="tblr">날씨: 6면 + 1공백</text>
      <text x="10" y="362" class="note">※ ∅90 캡과 공차·재료 동일</text>
    </g>

    <!-- === Section B-B === -->
    <text x="20" y="535" class="section">단면 B-B</text>

    <!-- 
      Section view ∅60: scale 5px/mm · cap 300px wide · centered at (320, 610)
      Cap x: 170 ~ 470 (300px)
      Cap y: 595 ~ 625 (30px = 6mm)
      Slot 0 at x=170 to 186 (3.2mm=16px)
      Shaft hole centered at 320, ∅5=25px, x=307.5 to 332.5
      Right end: solid cap (heptagon slot is between faces, not on axis)
    -->

    <rect x="186" y="595" width="121.5" height="30" fill="#d0dae7" stroke="#5a7aa0" stroke-width="1.2"/>
    <rect x="332.5" y="595" width="137.5" height="30" fill="#d0dae7" stroke="#5a7aa0" stroke-width="1.2"/>

    <!-- Hub boss (∅18 × 6mm) above cap -->
    <rect x="275" y="535" width="90" height="60" fill="#c3d1e3" stroke="#5a7aa0" stroke-width="1.2"/>
    <text x="320" y="528" class="lbl" text-anchor="middle">허브 보스 ∅18 × 12</text>

    <text x="178" y="588" class="lbl" text-anchor="middle">슬롯 0</text>
    <text x="460" y="588" class="note" text-anchor="middle">(반대쪽 벽재)</text>

    <!-- Shaft (extended through boss) -->
    <line x1="320" y1="530" x2="320" y2="670" stroke="#444" stroke-width="7"/>

    <!-- M3 insert hole through boss midheight (z=12, y=565) -->
    <rect x="297" y="560" width="46" height="10" fill="#fffbe7" stroke="#333" stroke-width="0.8"/>
    <text x="350" y="568" class="note">M3 (z=12)</text>

    <!-- Magnet pocket at R15 = 75px from center → x=245 -->
    <rect x="235" y="615" width="20" height="10" fill="#2d2d2d" stroke="#000" stroke-width="0.5"/>
    <rect x="237" y="617" width="16" height="6" fill="#556"/>
    <text x="245" y="622" class="note" text-anchor="middle" fill="#fff" font-size="7">자석</text>

    <line x1="245" y1="625" x2="245" y2="650" stroke="#a02020" stroke-width="0.4" stroke-dasharray="2,2"/>
    <text x="245" y="660" class="hid" text-anchor="middle" font-size="9">자석 ∅4×2</text>
    <text x="245" y="672" class="note" text-anchor="middle" fill="#a02020">(하부 캡만)</text>

    <!-- Thickness dim -->
    <line x1="490" y1="595" x2="490" y2="625" stroke="#2255aa" stroke-width="0.7" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <text x="498" y="613" class="dimval">6</text>

    <!-- Pocket depth -->
    <line x1="215" y1="615" x2="215" y2="625" stroke="#2255aa" stroke-width="0.7" marker-start="url(#arBs)" marker-end="url(#arB)"/>
    <text x="208" y="623" class="dim" text-anchor="end">2</text>

    <!-- Note -->
    <text x="20" y="720" class="note">※ 단면 B-B는 슬롯 0의 중심축선을 따라 절단. 7면이라 반대쪽은 면 사이 (벽재 두꺼움 = 구조 보강).</text>
    <text x="20" y="733" class="note">※ 상부 캡 제작: 하부 캡에서 자석 포켓만 제거 → CAD에서 suppress/config 토글.</text>
    <text x="20" y="746" class="note">※ M3 heat insert: Ruthex M3×4.0 OD 기준. 3D 프린트에서 열로 압입, 탭핑보다 내구성 우수.</text>
  </g>

